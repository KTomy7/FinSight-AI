name: Coverage Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  coverage-guardrails:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MAX_ALLOWED_DROP: "0.2"
      CHANGED_LINES_MIN: "80"
    outputs:
      pr_total: ${{ steps.pr_coverage.outputs.total }}
      main_total: ${{ steps.main_coverage.outputs.total }}
      coverage_drop: ${{ steps.coverage_guard.outputs.drop }}
      allowed_drop: ${{ env.MAX_ALLOWED_DROP }}
      changed_lines_coverage: ${{ steps.changed_lines.outputs.coverage }}
      changed_lines_min: ${{ env.CHANGED_LINES_MIN }}
      non_regression_status: ${{ steps.coverage_guard.outcome }}
      changed_lines_status: ${{ steps.changed_lines_guard.outcome }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests and generate PR coverage XML
        run: |
          python -m pytest --cov-fail-under=0 --cov-report=xml:coverage-pr.xml

      - name: Capture PR total coverage
        id: pr_coverage
        shell: bash
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          from decimal import Decimal

          root = ET.parse("coverage-pr.xml").getroot()
          pr_total = Decimal(root.attrib["line-rate"]) * Decimal("100")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"total={pr_total}\n")
          print(f"PR total coverage: {pr_total:.2f}%")
          PY

      - name: Compute baseline coverage from main
        id: main_coverage
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git worktree add ../_baseline_main origin/main

          pushd ../_baseline_main
          # Isolate baseline deps/editable install from the PR workspace environment.
          python -m venv .venv-baseline
          source .venv-baseline/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest --cov-fail-under=0 --cov-report=xml:coverage-main.xml

          python - <<'PY'
          import xml.etree.ElementTree as ET
          import os
          from decimal import Decimal

          root = ET.parse("coverage-main.xml").getroot()
          main_total = Decimal(root.attrib["line-rate"]) * Decimal("100")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"total={main_total}\n")
          print(f"Main total coverage: {main_total:.2f}%")
          PY
          deactivate
          popd

          git worktree remove ../_baseline_main --force

      - name: Enforce non-regression coverage gate
        id: coverage_guard
        shell: bash
        env:
          PR_TOTAL: ${{ steps.pr_coverage.outputs.total }}
          MAIN_TOTAL: ${{ steps.main_coverage.outputs.total }}
        run: |
          python - <<'PY'
          import os
          import sys
          from decimal import Decimal

          pr_total = Decimal(os.environ["PR_TOTAL"])
          main_total = Decimal(os.environ["MAIN_TOTAL"])
          max_drop = Decimal(os.environ["MAX_ALLOWED_DROP"])

          drop = main_total - pr_total
          allowed_floor = main_total - max_drop

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"drop={drop}\n")
              fh.write(f"allowed_floor={allowed_floor}\n")

          print(f"Main coverage: {main_total:.2f}%")
          print(f"PR coverage: {pr_total:.2f}%")
          print(f"Coverage drop: {drop:.2f}%")
          print(f"Allowed drop: {max_drop:.2f}%")

          if pr_total < allowed_floor:
              print(
                  f"Coverage regression too large: drop {drop:.2f}% exceeds allowed {max_drop:.2f}%",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("Coverage non-regression gate passed.")
          PY

      - name: Measure changed-lines coverage
        id: changed_lines
        shell: bash
        run: |
          diff-cover coverage-pr.xml \
            --compare-branch=origin/main | tee diff-cover.txt

          python - <<'PY'
          import os
          import re
          from decimal import Decimal

          text = open("diff-cover.txt", "r", encoding="utf-8").read()
          matches = re.findall(r"Coverage:\s*([0-9]+(?:\.[0-9]+)?)%", text)
          if not matches:
              # No measured diff coverage usually means no relevant coverable lines changed.
              changed_lines_coverage = Decimal("100")
          else:
              changed_lines_coverage = Decimal(matches[-1])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"coverage={changed_lines_coverage}\n")
          print(f"Changed-lines coverage: {changed_lines_coverage:.2f}%")
          PY

      - name: Enforce changed-lines coverage >= threshold
        id: changed_lines_guard
        shell: bash
        env:
          CHANGED_LINES_COVERAGE: ${{ steps.changed_lines.outputs.coverage }}
        run: |
          python - <<'PY'
          import os
          import sys
          from decimal import Decimal

          changed = Decimal(os.environ["CHANGED_LINES_COVERAGE"])
          threshold = Decimal(os.environ["CHANGED_LINES_MIN"])

          print(f"Changed-lines coverage: {changed:.2f}%")
          print(f"Required changed-lines coverage: {threshold:.2f}%")

          if changed < threshold:
              print(
                  f"Changed-lines coverage gate failed: {changed:.2f}% < {threshold:.2f}%",
                  file=sys.stderr,
              )
              sys.exit(1)

          print("Changed-lines coverage gate passed.")
          PY

  comment-coverage:
    runs-on: ubuntu-latest
    needs: [coverage-guardrails]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Post coverage summary to PR
        uses: actions/github-script@v7
        env:
          COVERAGE_JOB_RESULT: ${{ needs.coverage-guardrails.result }}
          PR_TOTAL: ${{ needs.coverage-guardrails.outputs.pr_total }}
          MAIN_TOTAL: ${{ needs.coverage-guardrails.outputs.main_total }}
          COVERAGE_DROP: ${{ needs.coverage-guardrails.outputs.coverage_drop }}
          ALLOWED_DROP: ${{ needs.coverage-guardrails.outputs.allowed_drop }}
          CHANGED_LINES_COVERAGE: ${{ needs.coverage-guardrails.outputs.changed_lines_coverage }}
          CHANGED_LINES_MIN: ${{ needs.coverage-guardrails.outputs.changed_lines_min }}
          NON_REGRESSION_STATUS: ${{ needs.coverage-guardrails.outputs.non_regression_status }}
          CHANGED_LINES_STATUS: ${{ needs.coverage-guardrails.outputs.changed_lines_status }}
        with:
          script: |
            const marker = '<!-- coverage-guardrails -->';
            const formatPercent = (value, fallback = 'n/a') => {
              const raw = value ?? fallback;
              const n = Number.parseFloat(raw);
              return Number.isFinite(n) ? n.toFixed(2) : raw;
            };
            const prTotal = formatPercent(process.env.PR_TOTAL, 'n/a');
            const mainTotal = formatPercent(process.env.MAIN_TOTAL, 'n/a');
            const drop = formatPercent(process.env.COVERAGE_DROP, 'n/a');
            const allowed = formatPercent(process.env.ALLOWED_DROP, '0.2');
            const changed = formatPercent(process.env.CHANGED_LINES_COVERAGE, 'n/a');
            const changedMin = formatPercent(process.env.CHANGED_LINES_MIN, '80');
            const nonRegressionStatus = process.env.NON_REGRESSION_STATUS || 'n/a';
            const changedLinesStatus = process.env.CHANGED_LINES_STATUS || 'n/a';
            const coverageJobResult = process.env.COVERAGE_JOB_RESULT || 'n/a';

            const body = [
              marker,
              '## Coverage Guardrails',
              `- Coverage job result: **${coverageJobResult}**`,
              `- PR total coverage: **${prTotal}%**`,
              `- Main total coverage: **${mainTotal}%**`,
              `- Coverage delta (main - PR): **${drop}%**`,
              `- Allowed max drop: **${allowed}%**`,
              `- Changed-lines coverage: **${changed}%**`,
              `- Required changed-lines coverage: **${changedMin}%**`,
              `- Non-regression gate: **${nonRegressionStatus}**`,
              `- Changed-lines gate: **${changedLinesStatus}**`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }


