# ====================================
# Stock Data Settings
# ====================================
stock_data:
  default_symbol: "AAPL"
  default_lookback_days: 365   # Number of calendar days to look back when no start_date is supplied
  default_interval: "1d"       # e.g., "1d", "1wk", "1mo"

# ====================================
# Preprocessing Settings
# ====================================
preprocessing:
  lag_window: 5           # Number of lag days for features
  test_size: 0.2          # Proportion of data for testing
  shuffle: false          # Whether to shuffle data before splitting

# ====================================
# Cache Settings
# ====================================
cache:
  resource_ttl_seconds: 3600
  data_ttl_seconds: 900

# ====================================
# Model Defaults (UI + app defaults)
# ====================================
model_defaults:
  options:
    - "x model"
    - "y model"
    - "z model"
  default_model: "x model"
  horizon_min: 7
  horizon_max: 90
  default_horizon: 30

