# ====================================
# Stock Data Settings
# ====================================
stock_data:
  default_symbol: "AAPL"
  default_lookback_days: 365   # Number of calendar days to look back when no start_date is supplied
  default_interval: "1d"       # e.g., "1d", "1wk", "1mo"

# ====================================
# Preprocessing Settings
# ====================================
preprocessing:
  lag_window: 5           # Number of lag days for features
  test_size: 0.2          # Proportion of data for testing
  shuffle: false          # Whether to shuffle data before splitting

# ====================================
# Cache Settings
# ====================================
cache:
  resource_ttl_seconds: 3600
  data_ttl_seconds: 900

# ====================================
# Model Defaults (UI + app defaults)
# ====================================
model_defaults:
  catalog:
    - id: "naive_zero"
      label: "Naive (Zero)"
      supports_training: true
      supports_prediction: true
    - id: "naive_mean"
      label: "Naive (Mean)"
      supports_training: true
      supports_prediction: true
    - id: "ridge"
      label: "Ridge Regression"
      supports_training: false
      supports_prediction: false
  default_model_id: "naive_zero"
  horizon_min: 7
  horizon_max: 90
  default_horizon: 30

# ====================================
# Ticker Catalog (shared by train + predict)
# ====================================
ticker_catalog:
  - symbol: "AAPL" # Technology
    company_name: "Apple Inc."
  - symbol: "JPM" # Financials
    company_name: "JPMorgan Chase & Co."
  - symbol: "XOM" # Energy
    company_name: "Exxon Mobil Corporation"
  - symbol: "KO" # Consumer
    company_name: "The Coca-Cola Company"
  - symbol: "TSLA" # Growth
    company_name: "Tesla, Inc."

